name: CI

on:
  push:
    branches: [ main, develop, 'copilot/**' ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore NFe.RestAPI.sln

      - name: Build
        run: dotnet build NFe.RestAPI.sln --configuration Release --no-restore
